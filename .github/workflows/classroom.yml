name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: test1-1
      id: test1-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-1
        setup-command: gcc ./code/1-1.c -o ./code/1-1.exe
        command: "./code/1-1.exe"
        input: ''
        expected-output: |
          10 + 5 = 15
          10 - 5 = 5
          10 * 5 = 50
          10 / 5 = 2
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test1-2
      id: test1-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-2
        setup-command: gcc ./code/1-2.c -o ./code/1-2.exe
        command: "./code/1-2.exe"
        input: ''
        expected-output: |
          Welcome to Computer Programming 03 Lab!
          5 25
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test1-3
      id: test1-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test1-3
        setup-command: gcc ./code/1-3.c -o ./code/1-3.exe
        command: "./code/1-3.exe"
        input: ''
        expected-output: |
          8
          1
          81
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-1
      id: test2-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-1
        setup-command: gcc ./code/2-1.c -o ./code/2-1.exe
        command: "./code/2-1.exe"
        input: ''
        expected-output: |
          10
          11
          10
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-2
      id: test2-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-2
        setup-command: gcc ./code/2-2.c -o ./code/2-2.exe
        command: "./code/2-2.exe"
        input: ''
        expected-output: |
          x = 100, y = 200
          x = 200, y = 100
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test2-3
      id: test2-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test2-3
        setup-command: gcc ./code/2-3.c -o ./code/2-3.exe
        command: "./code/2-3.exe"
        input: ''
        expected-output: |
          6
          3
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-1
      id: test3-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-1
        setup-command: gcc ./code/3-1.c -o ./code/3-1.exe
        command: "./code/3-1.exe"
        input: ''
        expected-output: |
          1
          2
          3
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-2
      id: test3-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-2
        setup-command: gcc ./code/3-2.c -o ./code/3-2.exe
        command: "./code/3-2.exe"
        input: ''
        expected-output: |
          global_var: 1
          static_var: 1
          local_var: 1

          global_var: 2
          static_var: 2
          local_var: 1

          global_var: 3
          static_var: 3
          local_var: 1
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-3
      id: test3-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-3
        setup-command: gcc ./code/3-3.c -o ./code/3-3.exe
        command: "./code/3-3.exe"
        input: ''
        expected-output: |
          20
          30
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-4
      id: test3-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-4
        setup-command: gcc ./code/3-4.c -o ./code/3-4.exe
        command: "./code/3-4.exe"
        input: ''
        expected-output: |
          12
          6
          300
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test3-5
      id: test3-5
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-5
        setup-command: gcc ./code/3-5.c -o ./code/3-5.exe
        command: "./code/3-5.exe"
        input: ''
        expected-output: |
          Hello World
          CNU
          100
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST1-1_RESULTS: "${{steps.test1-1.outputs.result}}"
        TEST1-2_RESULTS: "${{steps.test1-2.outputs.result}}"
        TEST1-3_RESULTS: "${{steps.test1-3.outputs.result}}"
        TEST2-1_RESULTS: "${{steps.test2-1.outputs.result}}"
        TEST2-2_RESULTS: "${{steps.test2-2.outputs.result}}"
        TEST2-3_RESULTS: "${{steps.test2-3.outputs.result}}"
        TEST3-1_RESULTS: "${{steps.test3-1.outputs.result}}"
        TEST3-2_RESULTS: "${{steps.test3-2.outputs.result}}"
        TEST3-3_RESULTS: "${{steps.test3-3.outputs.result}}"
        TEST3-4_RESULTS: "${{steps.test3-4.outputs.result}}"
        TEST3-5_RESULTS: "${{steps.test3-5.outputs.result}}"
      with:
        runners: test1-1,test1-2,test1-3,test2-1,test2-2,test2-3,test3-1,test3-2,test3-3,test3-4,test3-5
